# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# # remap prefix from 'C-b' to 'C-a'
# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Enable vi mode for copy mode
setw -g mode-keys vi

# Mouse selection doesn't copy immediately - just selects
unbind -T copy-mode MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane

# Vim-style copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
if-shell "uname | grep -q Darwin" \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"'

# Allow terminal title passthrough
set -g set-titles on
set -g set-titles-string "#S - #W"

# Don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Set up window titles
set-environment -g TMUX_RENAME_WINDOW_CMD 'tmux rename-window "$(basename $(git -C #{pane_current_path} rev-parse --show-toplevel 2>/dev/null || echo #{b:pane_current_path}))"'

set-hook -g after-new-window 'run-shell $TMUX_RENAME_WINDOW_CMD'
set-hook -g after-split-window 'run-shell $TMUX_RENAME_WINDOW_CMD'
set-hook -g pane-focus-in 'run-shell $TMUX_RENAME_WINDOW_CMD'

set -g @continuum-restore 'on'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Local overrides (machine-specific, not tracked in dotfiles)
source-file -q ~/.tmux.conf.local

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
